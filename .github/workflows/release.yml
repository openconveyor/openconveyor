name: Release

on:
  push:
    tags:
      - 'v*'

# The release job needs to push images to GHCR (`packages: write`) and
# create a GitHub Release with an attached install.yaml (`contents: write`).
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: |
          go mod tidy
          make test

  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: conveyor
            context: .
            dockerfile: Dockerfile
          - image: agent-claude-implementer
            context: agents/claude-code-implementer
            dockerfile: agents/claude-code-implementer/Dockerfile
          - image: agent-claude-reviewer
            context: agents/claude-code-reviewer
            dockerfile: agents/claude-code-reviewer/Dockerfile
          - image: agent-claude-reporter
            context: agents/claude-code-reporter
            dockerfile: agents/claude-code-reporter/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
          provenance: false

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build install.yaml
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.OWNER }}/conveyor:${{ github.ref_name }}
        run: make build-installer IMG="$IMG"

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Strip the leading 'v' from vX.Y.Z to match the [X.Y.Z] heading.
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
            in_section && /^## \[/    { exit }
            in_section                { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No matching CHANGELOG section for $version — release notes will be empty." >&2
            echo "See https://github.com/${{ github.repository }}/blob/${TAG}/CHANGELOG.md" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/install.yaml
          fail_on_unmatched_files: true
