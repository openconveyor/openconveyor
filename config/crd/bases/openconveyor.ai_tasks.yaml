---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tasks.openconveyor.ai
spec:
  group: openconveyor.ai
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agent.ref
      name: Agent
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.startTime
      name: Started
      priority: 1
      type: date
    - jsonPath: .status.completionTime
      name: Completed
      priority: 1
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Task is a single agent run: the orchestrator materializes a ServiceAccount,
          Role, NetworkPolicy, and Job from this spec and tears them down when done.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Task
            properties:
              agent:
                description: agent selects the AgentClass that runs this Task.
                properties:
                  config:
                    description: config is passed to the agent image as-is (mounted
                      as JSON at /task/config.json).
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  ref:
                    description: ref is the name of a ClusterAgentClass.
                    type: string
                required:
                - ref
                type: object
              permissions:
                description: |-
                  permissions declares the Task's least-privilege requirements.
                  Default is zero egress, zero secrets, zero RBAC.
                properties:
                  egress:
                    description: |-
                      egress is the allowlist of DNS names or CIDR blocks the Task may reach.
                      Default-deny otherwise. Resolved to NetworkPolicy egress rules at reconcile time.
                    items:
                      type: string
                    type: array
                  rbac:
                    description: |-
                      rbac is the list of Kubernetes RBAC rules the Task needs. Empty means
                      the Task has no ServiceAccount token and cannot talk to the k8s API.
                    items:
                      description: |-
                        RBACRule is a minimal Kubernetes RBAC policy rule. Mirrors rbacv1.PolicyRule
                        but kept local so the Task CRD schema does not transitively embed rbac/v1.
                      properties:
                        apiGroups:
                          items:
                            type: string
                          type: array
                        resourceNames:
                          items:
                            type: string
                          type: array
                        resources:
                          items:
                            type: string
                          type: array
                        verbs:
                          items:
                            type: string
                          type: array
                      required:
                      - apiGroups
                      - resources
                      - verbs
                      type: object
                    type: array
                  secrets:
                    description: |-
                      secrets is the list of Secret names (in the Task's namespace) projected
                      as files at /run/secrets/<name>. Env-var injection is intentionally not
                      supported — env vars leak into /proc.
                    items:
                      type: string
                    type: array
                type: object
              prompt:
                description: prompt provides the prompt body. Exactly one source must
                  be set.
                properties:
                  configMapRef:
                    description: configMapRef reads the prompt from a ConfigMap key
                      in the Task's namespace.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the ConfigMap or its key must
                          be defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                  inline:
                    description: inline is the prompt body as a string.
                    type: string
                  secretRef:
                    description: secretRef reads the prompt from a Secret key in the
                      Task's namespace.
                    properties:
                      key:
                        description: The key of the secret to select from.  Must be
                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              resources:
                description: resources bounds CPU/memory/wall-clock.
                properties:
                  cpu:
                    description: cpu request/limit, e.g. "500m" or "1".
                    type: string
                  memory:
                    description: memory request/limit, e.g. "512Mi" or "1Gi".
                    type: string
                  timeout:
                    description: |-
                      timeout is mandatory. The controller rejects Tasks without one.
                      Mapped to Job.spec.activeDeadlineSeconds.
                    type: string
                required:
                - timeout
                type: object
            required:
            - agent
            - prompt
            - resources
            type: object
          status:
            description: status defines the observed state of Task
            properties:
              completionTime:
                description: completionTime is when the Job finished (success or failure).
                format: date-time
                type: string
              conditions:
                description: conditions surface reconciler state per Kubernetes API
                  conventions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobName:
                description: jobName references the Job owned by this Task.
                type: string
              observedGeneration:
                description: |-
                  observedGeneration is the most recent .metadata.generation the
                  controller has reconciled against. Consumers use it to detect stale
                  status after a spec change.
                format: int64
                type: integer
              phase:
                description: phase is a coarse lifecycle marker.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                - TimedOut
                type: string
              startTime:
                description: startTime is when the Job first started.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
