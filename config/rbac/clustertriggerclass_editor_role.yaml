# This rule is not used by the project conveyor itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the openconveyor.ai.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: conveyor
    app.kubernetes.io/managed-by: kustomize
  name: clustertriggerclass-editor-role
rules:
- apiGroups:
  - openconveyor.ai
  resources:
  - clustertriggerclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - openconveyor.ai
  resources:
  - clustertriggerclasses/status
  verbs:
  - get
