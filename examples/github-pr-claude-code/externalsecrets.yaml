# ExternalSecret definitions for the OpenConveyor smoke test.
#
# The target Secret name must match whatever the AgentClass (or the Task's
# own permissions.secrets) declares — that's the only constraint
# OpenConveyor enforces. The bundled samples declare `anthropic-api-key`
# and `github-token`; if you've forked the AgentClass and renamed, mirror
# the change here.
#
# Replace `<your-secret-store>` and the remoteRef.key paths to match your
# backend. Apply alongside the namespace; ESO will materialise the Secrets.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: conveyor-tasks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: <your-secret-store>
    kind: ClusterSecretStore
  target:
    name: anthropic-api-key
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: openconveyor/anthropic-api-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token
  namespace: conveyor-tasks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: <your-secret-store>
    kind: ClusterSecretStore
  target:
    # Renaming this breaks $GITHUB_TOKEN discovery in the agent.
    name: github-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: openconveyor/github-token
